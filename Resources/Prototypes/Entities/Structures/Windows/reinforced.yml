# Fulltile
- type: entity
  id: ReinforcedWindow
  name: reinforced window
  parent: [ BaseDeltaPressureReinforcedGlass, BaseWindowReinforcedFulltileRCDable ]
  components:
  - type: Sprite
    sprite: Structures/Windows/reinforced_window.rsi
  - type: Icon
    sprite: Structures/Windows/reinforced_window.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250 #excess damage (nuke?). avoid computational cost of spawning entities.
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 2
          PartRodMetal:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    base: rwindow
  - type: Construction
    graph: Window
    node: reinforcedWindow
  - type: Appearance
  - type: DamageVisuals
    damageDivisor: 8

# Directional
- type: entity
  id: WindowReinforcedDirectional
  parent: [ BaseDeltaPressureReinforcedGlassQuarter, BaseWindowReinforcedDirectionalRCDable ]
  name: directional reinforced window
  components:
  - type: Sprite
    state: reinforced_window
  - type: Icon
    state: reinforced_window
  - type: Construction
    graph: WindowDirectional
    node: windowReinforcedDirectional
  - type: DamageVisuals
    damageDivisor: 4
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 2
          PartRodMetal:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    
# Diagonal
- type: entity
  parent: [ BaseWindowDiagonal, ReinforcedWindow ]
  id: ReinforcedWindowDiagonal
  components:
  - type: Sprite
    sprite: Structures/Windows/reinforced_window_diagonal.rsi
  - type: Icon
    sprite: Structures/Windows/reinforced_window_diagonal.rsi
  - type: Construction
    graph: WindowDiagonal
    node: reinforcedWindowDiagonal
