# Fulltile
# Normal Window
- type: entity
  id: Window
  parent: [ BaseDeltaPressureGlass, BaseWindowFulltileRCDable ]
  name: window
  components:
  - type: Sprite
    sprite: Structures/Windows/window.rsi
  - type: Icon
    sprite: Structures/Windows/window.rsi
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150 #excess damage (nuke?). avoid computational cost of spawning entities.
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: Window
    node: window

# Tinted Window
- type: entity
  parent: Window
  id: TintedWindow
  name: tinted window
  components:
  - type: Sprite
    sprite: Structures/Windows/tinted_window.rsi
  - type: Icon
    sprite: Structures/Windows/tinted_window.rsi
  - type: IconSmooth
    base: twindow
  - type: Construction
    graph: Window
    node: tintedWindow
  - type: Occluder

# Directional
# Normal Window
- type: entity
  id: WindowDirectional
  parent: [ BaseDeltaPressureGlassQuarter, BaseWindowDirectionalRCDable ]
  name: directional window
  components:
  - type: Sprite
    state: window
  - type: Icon
    state: window
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 100 #excess damage (nuke?). avoid computational cost of spawning entities.
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
    - trigger:
        !type:DamageTrigger
        damage: 50
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlass:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    graph: WindowDirectional
    node: windowDirectional

# Tinted / Frosted Window
- type: entity
  id: WindowFrostedDirectional
  parent: WindowDirectional
  name: directional frosted window
  placement:
    mode: SnapgridCenter
    snap:
    - Window
  components:
  - type: Sprite
    state: frosted_window
  - type: Icon
    state: frosted_window

# Diagonal
# Normal Window
- type: entity
  parent: [ BaseWindowDiagonal, Window ]
  id: WindowDiagonal
  components:
  - type: Construction
    graph: WindowDiagonal
    node: windowDiagonal
