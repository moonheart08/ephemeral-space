- type: entity
  id: ReinforcedPlasmaWindow
  name: reinforced plasma window
  parent: [ BaseDeltaPressureReinforcedPlasma, BaseWindowReinforcedDamageable, BaseWindowFulltile ]
  components:
  - type: Sprite
    sprite: Structures/Windows/reinforced_plasma_window.rsi
  - type: Icon
    sprite: Structures/Windows/reinforced_plasma_window.rsi
  - type: RadiationBlocker
    resistance: 4
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 350
      behaviors: #excess damage, don't spawn entities.
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassPlasma:
            min: 1
            max: 2
          PartRodMetal:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: IconSmooth
    base: rpwindow
  - type: Construction
    graph: Window
    node: reinforcedPlasmaWindow
  - type: DamageVisuals
    damageDivisor: 9

- type: entity
  id: PlasmaReinforcedWindowDirectional
  parent: [ BaseDeltaPressureReinforcedPlasmaQuarter, BaseWindowReinforcedDamageable, BaseWindowReinforcedDirectionalRCDable ]
  name: directional reinforced plasma window
  components:
  - type: Sprite
    state: plasma_reinforced_window
  - type: Icon
    state: plasma_reinforced_window
  - type: Construction
    graph: WindowDirectional
    node: plasmaReinforcedWindowDirectional
  - type: Appearance
  - type: DamageVisuals
    damageDivisor: 4.5
  - type: RadiationBlocker
    resistance: 2
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors: #excess damage, don't spawn entities.
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WindowShatter
      - !type:SpawnEntitiesBehavior
        spawn:
          ShardGlassPlasma:
            min: 1
            max: 1
          PartRodMetal:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: [ "Destruction" ]

- type: entity
  parent: [ BaseWindowDiagonal, ReinforcedPlasmaWindow ]
  id: ReinforcedPlasmaWindowDiagonal
  components:
  - type: Sprite
    sprite: Structures/Windows/reinforced_plasma_diagonal.rsi
  - type: Icon
    sprite: Structures/Windows/reinforced_plasma_diagonal.rsi
  - type: Construction
    graph: WindowDiagonal
    node: reinforcedPlasmaWindowDiagonal
