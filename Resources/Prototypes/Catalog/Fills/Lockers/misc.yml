# ES Start
# Removes emergency suits, flareguns, and MREs
- type: entityTable
  id: FillLockerEmergencyStandard
  table: !type:AllSelector
    children:
    - id: ClothingMaskBreath
    - !type:GroupSelector
      children:
      - id: EmergencyOxygenTankFilled
      - id: OxygenTankFilled
    - id: ToolboxEmergencyFilled
      prob: 0.5
    - group:
      - id: EmergencyPouchOxygenDeprivation
      - id: EmergencyPouchBrute
      prob: 0.25
# ES End

- type: entity
  id: ClosetEmergencyFilledRandom
  parent: ClosetEmergency
  suffix: Filled, Random
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillLockerEmergencyStandard

- type: entity
  id: ClosetWallEmergencyFilledRandom
  parent: ClosetWallEmergency
  suffix: Filled, Random
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillLockerEmergencyStandard

# ES Start
# Removes emergency suits and MREs. These are unused but have been changed for consistency anyways.
- type: entityTable
  id: FillLockerEmergencyN2Standard
  table: !type:AllSelector
    children:
    - id: ClothingMaskBreath
    - id: ToolboxEmergencyFilled
      prob: 0.05
    - !type:GroupSelector
      children:
      - id: EmergencyNitrogenTankFilled
        weight: 4
      - id: NitrogenTankFilled
# ES End

- type: entity
  id: ClosetEmergencyN2FilledRandom
  parent: ClosetEmergencyN2
  suffix: Filled, Random
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillLockerEmergencyN2Standard

- type: entity
  parent: ClosetWallEmergencyN2
  id: ClosetWallEmergencyN2FilledRandom
  suffix: Filled, Random
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
        tableId: FillLockerEmergencyN2Standard

- type: entityTable
  id: FillLockerFireStandard
  table: !type:AllSelector
    children:
    - id: ClothingOuterSuitFire
    - id: ClothingHeadHelmetFire
    - id: ClothingMaskGas
    - !type:GroupSelector
      children:
      - id: EmergencyOxygenTankFilled
      - id: OxygenTankFilled
    - id: CrowbarRed
    - !type:GroupSelector
      children:
      - id: FireExtinguisher
        weight: 98
      - id: SprayBottleWater #It's just budget cut after budget cut man
        weight: 2

- type: entity
  id: ClosetFireFilled
  parent: ClosetFire
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
# ES Start
        tableId: ESFillLockerFireStandard
# ES End

- type: entity
  id: ClosetWallFireFilledRandom
  parent: ClosetWallFire
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:NestedSelector
# ES START
        tableId: ESFillLockerFireStandard
# ES END

- type: entityTable
  id: SyndieMaintLoot
  table: !type:GroupSelector
    children:
    - !type:GroupSelector
      children:
      - id: ClothingUniformJumpsuitOperative
      - id: ClothingUniformJumpskirtOperative
    - id: ClothingBackpackDuffelSyndicate
    - id: CyberPen
    - id: CigPackSyndicate
    - id: ClothingBackpackDuffelSyndicatePyjamaBundle
