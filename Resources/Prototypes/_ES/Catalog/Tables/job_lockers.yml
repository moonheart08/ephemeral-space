# These are modified versions of the upstream fills as they are on 12/18/2025, crystalized in amber & modified for our needs so that we do not have to worry about them.
# Command
- type: entityTable
  id: ESLockerFillCaptain
  table: !type:AllSelector
    children:
    - id: CigarGoldCase
      prob: 0.25
    - id: ClothingHeadsetAltCommand
    - id: ESClothingOuterArmorCaptainCarapace
    - id: MedalCase
    - id: NukeDisk
    - id: PinpointerNuclear
    - id: RubberStampCaptain
    - id: Stunbaton
    - id: ForensicScanner
    - id: ClothingEyesGlassesSecurity

- type: entityTable
  id: ESLockerFillHeadOfPersonnel
  table: !type:AllSelector
    children:
    - id: AccessConfigurator
    - id: BoxEncryptionKeyPassenger
    - id: BoxEncryptionKeyService
    - id: BoxHeadset
    - id: BoxHoPStamps
    - id: BoxID
    - id: BoxPDA
    - id: CigarGoldCase
      prob: 0.25
    - id: ClothingHeadsetCommand
    - id: ClothingNeckGoldmedal
    - id: HoPIDCard
    - id: Stunbaton
    - id: ClothingEyesHudSecurity

# Security
- type: entityTable
  id: ESFillLockerSecurity
  table: !type:AllSelector
    children:
    - id: FlashlightSeclite
      prob: 0.8
    - id: ESClothingHeadHelmetSecurity
    - id: ESClothingOuterArmorSecurity
    - id: ClothingBeltSecurityFilled
    - id: Flash
      prob: 0.5
    - id: ClothingEyesGlassesSecurity
    - id: ClothingHeadsetSecurity

- type: entityTable
  id: ESFillLockerDetective
  table: !type:AllSelector
    children:
    - id: ClothingEyesGlassesNoir
    - id: ESWeaponRevolver357 # sure, the other security roles don't get guns, but what is a detective without their revolver?
    - id: ClothingHeadHatDetGadget
      prob: 0.15
    - id: Stunbaton
    - id: ESClothingOuterArmorDetective
    - id: FlippoEngravedLighter
    - id: FlashlightSeclite
    - id: ForensicScanner
    - id: BoxForensicPad
    - id: DrinkDetFlask
    - id: RubberStampDetective
    - id: BoxEvidenceMarkers
    - id: HandLabeler

# Service
- type: entityTable
  id: ESFillLockerBooze
  table: !type:AllSelector
    children:
    - id: ClothingOuterVest
    - id: ESWeaponDoubleBarrelShotgunNonlethal
    - id: DrinkShaker
    - id: ClothingEyesHudBeer
    - id: HandLabeler
    - id: DrinkBeerBottleFull
      amount: !type:BinomialNumberSelector
        trials: 3
    - !type:AllSelector
      rolls: 2
      children:
      - id: ESShotgunShellsBoxBeanbag
      - id: RagItem

# Science
- type: entityTable
  id: ESFillLockerScientist
