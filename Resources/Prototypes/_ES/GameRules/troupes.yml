- type: entity
  parent: BaseGameRule
  id: ESBaseTroupeRule
  abstract: true
  components:
  - type: ESTroupeRule
  - type: ESObjectiveHolder # necessary for troupe objectives

- type: entity
  parent: ESBaseTroupeRule
  name: The Crew
  id: ESTroupeRuleCrew
  components:
  - type: ESTroupeRule
    troupe: ESCrew
    priority: 10

- type: entity
  parent: ESBaseTroupeRule
  id: ESTroupeRuleTraitor
  name: The Traitors
  components:
  - type: ESTroupeRule
    troupe: ESTraitor
  - type: ESTraitorRule
  - type: LoadMapRule
    mapPath: /Maps/_ES/syndiebase.yml

- type: entity
  parent: ESBaseTroupeRule
  name: The Parasites
  id: ESTroupeRuleParasite
  components:
  - type: ESTroupeRule
    troupe: ESParasite
    priority: 10
  - type: ESParasiteRule
