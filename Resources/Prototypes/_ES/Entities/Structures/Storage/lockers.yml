# Coroner
- type: entity
  parent: [ LockerBaseSecurePersonal, LockerBase ]
  id: ESLockerCoroner
  name: coroner's locker
  components:
  - type: Sprite
    sprite: _ES/Structures/Storage/Closets/coroner.rsi
  - type: EntityStorageVisuals
    stateBaseClosed: generic
    stateDoorOpen: generic_open
    stateDoorClosed: generic_door
  - type: ESPersonalLocker
    job: ESCoroner

# Paramed
- type: entity
  parent: [ LockerBaseSecurePersonal, LockerBase ]
  id: ESLockerParamedic
  name: paramedic's locker
  components:
  - type: Sprite
    sprite: _ES/Structures/Storage/Closets/paramed.rsi
  - type: EntityStorageVisuals
    stateBaseClosed: generic
    stateDoorOpen: generic_open
    stateDoorClosed: generic_door
  - type: ESPersonalLocker
    job: ESParamedic
