- type: entity
  parent:
  - Incorporeal
  - BaseMob
  id: ESMobStagehand
  name: stagehand
  description: Every show needs a loyal crew in the back making it tick. Today, that person is you.
  components:
  - type: Sprite
    sprite: _ES/Mobs/Ghosts/theatergoer.rsi
    layers:
    - state: stagehand
      shader: unshaded
    - state: head-1
      map: [ "face" ]
      shader: unshaded
  - type: RandomSprite
    available:
    - face:
        head-1: ""
        head-2: ""
        head-3: ""
        head-4: ""
        head-5: ""
        head-6: ""
        head-7: ""
        head-8: ""
        head-9: ""
        head-10: ""
        head-11: ""
        head-12: ""
        head-13: ""
        head-14: ""
        head-15: ""
        head-16: ""
        head-17: ""
        head-18: ""
        head-19: ""
        head-20: ""
        head-21: ""
        head-22: ""
        head-23: ""
  - type: ContentEye
    maxZoom: 1.44,1.44
  - type: Eye
    drawFov: false
    visMask:
    - Normal
    - Ghost
  - type: Input
    context: "ghost"
  - type: Visibility
    layer: 2 #ghost vis layer
  - type: Examiner
    skipChecks: true
  - type: Ghost # TODO: reason about the implications of this
    toggleLightingAction: ESActionStagehandChangeLighting
    toggleFoVAction: ESActionStagehandToggleFOV
    deleteOnDetach: false
  - type: ESStagehandWorldEmote
  - type: ActionGrant # todo theres like three methods of giving them actions here. ghost stuff should just use this first of all
    actions:
    - ESActionStagehandCheer
    - ESActionStagehandBoo
  - type: GhostHearing
  - type: ESStagehand
  - type: ESUsernameEntityName
  - type: ESMindVisuals
  - type: ESBlockInteraction
  - type: ShowElectrocutionHUD
  - type: ESVoter
  - type: IntrinsicRadioReceiver
  - type: ActiveRadio
    receiveAllChannels: true
    globalReceive: true
  - type: ESInherentLight
    lightPrototype: ESMobObserverInherentLight
    enabled: false
  - type: ESBypassInteractionRangeChecks

- type: entity
  parent: BaseMentalAction
  id: ESActionStagehandChangeLighting
  name: Change Lighting
  description: Changes the lighting to help you see in the dark.
  components:
  - type: Action
    icon:
      sprite: Objects/Power/light_bulb.rsi
      state: normal
    clientExclusive: true
  - type: InstantAction
    event: !type:ToggleLightingActionEvent

- type: entity
  parent: BaseMentalAction
  id: ESActionStagehandToggleFOV
  name: Toggle FoV
  description: Toggles field-of-view in order to see what players see.
  components:
  - type: Action
    icon:
      sprite: _ES/Actions/stagehands.rsi
      state: fov-off
    iconOn: # BUG: Currently does not work due to network issues with toggling on client
      sprite: _ES/Actions/stagehands.rsi
      state: fov-on
    clientExclusive: true
  - type: InstantAction
    event: !type:ToggleFoVActionEvent

- type: entity
  parent: BaseMentalAction
  id: ESActionStagehandCheer
  name: Cheer
  description: Show your love for a jolly good show. Has a chance to be heard by those on stage.
  components:
  - type: Action
    useDelay: 120
    icon:
      sprite: _ES/Actions/stagehands.rsi
      state: cheer
  - type: InstantAction
    event: !type:ESStagehandWorldEmoteEvent
      emote: Cheer

- type: entity
  parent: BaseMentalAction
  id: ESActionStagehandBoo
  name: Boo
  description: Show your hatred for a bloody awful show. Has a chance to be heard by those on stage.
  components:
  - type: Action
    useDelay: 300
    icon:
      sprite: _ES/Actions/stagehands.rsi
      state: boo
  - type: InstantAction
    event: !type:ESStagehandWorldEmoteEvent
      emote: Boo
