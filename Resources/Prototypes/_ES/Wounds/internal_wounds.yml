- type: entity
  parent: WoundInternalBase
  id: ESWoundSmokeInhalation
  name: smoke inhalation
  components:
  - type: Wound
    damage:
      damageDict:
        Asphyxiation: 20
    maximumDamage: 50
  - type: AnalyzableWound
    descriptions:
      0: es-wound-smoke-inhalation
  - type: PopupOnAppliedStatusEffect
    message: es-smoke-inhalation-applied
    visualType: MediumCaution
  - type: ExaminableStatusEffect
    message: es-smoke-inhalation-examine
    priority: -12
  - type: DrunkStatusEffect # dizzy dizzy
  - type: CauseStatusEffectRandomlyStatusEffect
    probability: 0.5
    updateInterval: 10
    effects:
    - [ESStatusEffectCoughOnApplied, 10]
    - [ESStatusEffectCoughingAccent, 10]
  - type: StatusEffectAlert
    alert: ESSmokeInhalation
