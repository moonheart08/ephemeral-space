- type: entity
  parent: ESBaseMaskObjective
  id: ESObjectiveHaterHate
  name: Hate on your target
  description: Make sure your target fails all of their objectives.
  components:
  - type: ESObjective
    icon:
      sprite: Objects/Misc/skub.rsi
      state: icon
  - type: ESTargetObjective
    title: es-hater-fail-objective-title
  - type: ESTargetPlayersObjective
  - type: ESTargetCharacterBlurb
  - type: ESTargetCompleteOwnedObjective
    invert: true
    objectiveBlacklist:
      components: # this will probably infinitely loop if it targets itself?
      - ESTargetCompleteOwnedObjective

- type: entity
  parent: ESBaseMaskObjective
  id: ESObjectiveHaterDontKill
  name: Don't kill your target
  description: You hate 'em, but you wouldn't want them dead. At least, not by your hands.
  components:
  - type: ESObjective
    icon:
      sprite: /Textures/Objects/Specific/Medical/medical.rsi
      state: gauze
    invertProgress: true
  - type: ESTargetObjective
    title: es-hater-objective-dont-kill-title
  - type: ESShareTargetObjective
    objectiveWhitelist:
      components:
      - ESTargetCompleteOwnedObjective
  - type: ESDirectKillTargetObjective
    successMessage: null
  - type: ESCounterObjective
