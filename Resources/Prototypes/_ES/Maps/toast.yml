- type: gameMap
  id: ESToast
  mapName: 'Toast Station'
  mapPath: /Maps/_ES/toast.yml
  minPlayers: 0
  randomRotation: false # makes space look better
  stations:
    Toast:
      stationProto: ESBaseStationNeutral
      components:
      - type: StationNameSetup
        mapNameTemplate: 'NT Toast Station 14'
        nameGenerator:
          !type:ESSimpleNameGenerator
      - type: StationJobs
        availableJobs: # 24 jobs total
          #command (2)
          ESCaptain: [ 1, 1 ]
          ESHeadOfPersonnel: [ 1, 1 ]
          #service (3)
          ESBartender: [ 1, 1 ]
          ESBotanist: [ 1, 1 ]
          ESChef: [ 1, 1 ]
          #engineering (4)
          ESAtmosphericTechnician: [ 2, 2 ]
          ESStationEngineer: [ 2, 2 ]
          #medical (4)
          ESPhysician: [ 2, 2 ]
          ESParamedic: [ 1, 1 ]
          ESCoroner: [ 1, 1 ]
          #science (3)
          ESScientist: [ 3, 3 ]
          #security (4)
          ESSecurityOfficer: [ 3, 3 ]
          ESDetective: [ 1, 1 ]
          #cargo (2)
          ESCargoTechnician: [ 1, 1 ]
          ESJanitor: [ 1, 1 ]
          #civilian (2+)
          ESClown: [ 1, 1 ]
          ESReporter: [ 1, 1 ]
          ESAssistant: [ -1, -1 ]
